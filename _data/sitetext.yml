    list:
      - title: "Power Flow Analysis"
        desc: "Steady-state power flow studies for transmission and distribution systems to ensure reliable operation and identify potential issues."
        icon: fas fa-project-diagram
      - title: "Dynamic Simulation"
        desc: "Transient stability and dynamic performance assessment to evaluate system response to disturbances and faults."
        icon: fas fa-wave-square
      - title: "Interconnection Studies"
        desc: "Load and generation interconnection studies to support project development and regulatory compliance."
        icon: fas fa-plug
      - title: "EMT Simulation"
        desc: "Electromagnetic transient analysis for detailed modeling of power electronics, switching events, and fast transient phenomena."
        icon: fas fa-bolt
      - title: "Distribution Analysis"
        desc: "Distribution system modeling and analysis including hosting capacity, volt-var optimization, and DER integration."
        icon: fas fa-network-wired
      - title: "Consulting & Training"
        desc: "Expert guidance on power system tools and methodologies, including customized training for engineering teams."
        icon: fas fa-chalkboard-teacher

